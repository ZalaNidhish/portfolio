<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (more keyword-rich) -->
    <title>Nidhish Zala | Full Stack Developer | MERN</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Portfolio of Nidhish Zala, a Full Stack Developer specializing in MERN Stack, React, Node.js, PHP, and MySQL. Explore projects, skills, and contact details."
    />
    <meta
      name="keywords"
      content="Nidhish Zala, Full Stack Developer India, MERN Developer, React Developer, Node.js Developer, Portfolio, Web Developer Ahmedabad"
    />
    <meta name="author" content="Nidhish Zala" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (VERY IMPORTANT) -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/fevicon.png" />

    <!-- Open Graph (for LinkedIn, WhatsApp, etc.) -->
    <meta property="og:title" content="Nidhish Zala | Full Stack Developer" />
    <meta
      property="og:description"
      content="Full Stack Developer specializing in MERN Stack. Check out my projects and portfolio."
    />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nidhish Zala | Full Stack Developer" />
    <meta
      name="twitter:description"
      content="Explore the portfolio of Nidhish Zala — MERN Stack Developer."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Structured Data (BIG SEO BOOST 🚀) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Nidhish Zala",
        "url": "https://yourdomain.com/",
        "sameAs": [
          "https://linkedin.com/in/yourprofile",
          "https://github.com/yourprofile"
        ],
        "jobTitle": "Full Stack Developer",
        "worksFor": {
          "@type": "Organization",
          "name": "Freelance"
        },
        "description": "Full Stack Developer specializing in MERN Stack, React, Node.js, PHP, and MySQL."
      }
    </script>

    <!-- Prevent flash -->
    <style>
      body {
        background: #0a0a0f;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
